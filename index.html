<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>弦外之音 | 卡拉比-丘随机流形 · 空间恒定版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #0f0;
            font-family: 'Courier New', monospace;
            user-select: none;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            min-height: 100vh;
        }

        #container {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            width: 100%;
        }

        #top-zone {
            position: relative;
            border-bottom: 1px solid #222;
            display: flex;
            min-height: 300px;
            flex: 3 1 auto;
        }

        #canvas-3d {
            flex: 1;
            cursor: pointer;
            touch-action: none;
            width: 100%;
            height: 100%;
            background: #000;
        }

        #right-panel {
            width: 180px;
            background: #050505;
            border-left: 1px solid #333;
            display: flex;
            flex-direction: column;
            padding: 5px;
            box-sizing: border-box;
        }

        .panel-title {
            font-size: 9px;
            color: #0ff;
            margin: 5px 0 3px 0;
            text-align: center;
            border-bottom: 1px solid #333;
        }

        #canvas-cloud,
        #canvas-entropy {
            width: 100%;
            background: #080808;
            border: 1px solid #333;
            box-sizing: border-box;
        }

        #canvas-cloud {
            height: 110px;
            margin-bottom: 8px;
        }

        #canvas-entropy {
            height: 110px;
        }

        #bottom-zone {
            display: flex;
            flex-direction: column;
            padding: 12px 12px 20px;
            box-sizing: border-box;
            background: #050505;
            flex: 2 1 auto;
        }

        #charts-row {
            display: flex;
            flex-direction: row;
            gap: 8px;
            margin-bottom: 12px;
            flex-shrink: 0;
        }

        .chart-item {
            flex: 1;
            background: #050505;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 4px;
            display: flex;
            flex-direction: column;
        }

        .chart-item .panel-title {
            margin: 0 0 4px 0;
            font-size: 10px;
        }

        .chart-item canvas {
            width: 100%;
            background: #080808;
            border: 1px solid #333;
            height: auto;
            min-height: 80px;
        }

        #waveform-container {
            flex: 1;
            position: relative;
            border: 1px solid #333;
            background: #050505;
            min-height: 100px;
            margin-bottom: 12px;
        }

        #canvas-wave {
            display: block;
            width: 100%;
            height: 100%;
            background: #050505;
        }

        #hex-stream {
            font-size: 10px;
            padding: 8px 4px;
            color: #0f0;
            opacity: 0.8;
            border-top: 1px solid #222;
            word-break: break-word;
            white-space: normal;
            line-height: 1.4;
            flex-shrink: 0;
        }

        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            backdrop-filter: blur(8px);
            text-align: center;
            padding: 20px;
        }

        #overlay.hidden {
            display: none;
        }

        .overlay-msg {
            color: #ff0;
            font-size: 18px;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .gyro-control {
            display: flex;
            align-items: center;
            gap: 12px;
            color: #0f0;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid #222;
            padding: 10px 20px;
            background: rgba(10,10,10,0.8);
        }

        .gyro-control input {
            width: 18px;
            height: 18px;
            cursor: pointer;
            accent-color: #0f0;
        }

        .label {
            position: absolute;
            font-size: 10px;
            color: #888;
            pointer-events: none;
        }

        #info {
            position: absolute;
            top: 8px;
            left: 8px;
            right: auto;
            width: auto;
            max-width: 200px;
            color: #ff0;
            font-size: 8px;
            white-space: pre-wrap;
            font-family: monospace;
            background: transparent;
            padding: 4px 6px;
            border-radius: 0;
            pointer-events: none;
            z-index: 20;
            border: none;
            backdrop-filter: none;
            text-shadow: 0 0 2px #000;
            line-height: 1.3;
        }

        #footer {
            background: #000;
            padding: 8px 12px;
            text-align: center;
            font-size: 8px;
            color: #444;
            border-top: 1px solid #222;
            flex-shrink: 0;
        }

        @media (max-width: 768px) and (orientation: portrait) {
            #top-zone {
                flex-direction: column;
                min-height: 40vh;
            }
            #canvas-3d {
                min-height: 35vh;
            }
            #right-panel {
                display: none;
            }
            #bottom-zone {
                padding: 10px 10px 24px;
            }
            #charts-row {
                margin-bottom: 10px;
                gap: 6px;
            }
            .chart-item .panel-title {
                font-size: 9px;
            }
            .chart-item canvas {
                min-height: 70px;
            }
            #waveform-container {
                min-height: 90px;
                margin-bottom: 10px;
            }
            #info {
                top: 6px;
                left: 6px;
                font-size: 7px;
                max-width: 180px;
                padding: 3px 5px;
            }
            #hex-stream {
                font-size: 8px;
                padding: 6px 4px;
            }
            #footer {
                font-size: 7px;
                padding: 6px 8px;
            }
        }

        @media (orientation: landscape) {
            #charts-row {
                display: none;
            }
            #info {
                top: 8px;
                left: 8px;
                max-width: 240px;
                font-size: 8px;
            }
        }
    </style>
</head>
<body>

<div id="overlay">
    <div class="overlay-msg">点击屏幕 开启“弦外之音”回响</div>
    <label class="gyro-control" id="gyro-label">
        <input type="checkbox" id="gyro-toggle" checked>
        启动手机体感的 □ (空间恒定交互)
    </label>
</div>

<div id="container">
    <div id="top-zone">
        <canvas id="canvas-3d"></canvas>
        <div id="right-panel">
            <div class="panel-title">ALETHEIA CLOUD (P-Space)</div>
            <canvas id="canvas-cloud"></canvas>
            <div class="panel-title" style="margin-top: 8px;">H-ENTROPY (Bits)</div>
            <canvas id="canvas-entropy"></canvas>
        </div>
        <div id="info" class="label">11D MANIFOLD ECHO V1.0<br>STATUS: INITIALIZING...</div>
    </div>

    <div id="bottom-zone">
        <div id="charts-row">
            <div class="chart-item">
                <div class="panel-title">ALETHEIA CLOUD (P-Space)</div>
                <canvas id="canvas-cloud-mobile"></canvas>
            </div>
            <div class="chart-item">
                <div class="panel-title">H-ENTROPY (Bits)</div>
                <canvas id="canvas-entropy-mobile"></canvas>
            </div>
        </div>
        <div id="waveform-container">
            <div class="label" style="top:2px; left:5px;">ECHO WAVEFORM</div>
            <canvas id="canvas-wave"></canvas>
        </div>
        <div id="hex-stream">>>> INITIALIZING ALETHEIA ENGINE...</div>
    </div>
    <div id="footer">© 弦外之音 | 单击模型区域切换播放/暂停 | 传感器模式下模型恒定 | 网格颜色随粒子靠近变红 | 流形·随机卡拉比-丘族系</div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
/**
 * 弦外之音 (Extra-Vibrational Echo) 增强版 - 空间恒定版
 */

// ========== 全局变量 ==========
let audioCtx, oscillatorA, oscillatorB, gainNode, analyser;
let started = false;
let paused = true;
let entropyPoints = [];
let entropyHistory = [];
let lastHash = "0000000000000000";
let waveBuffer = [];

// 空间传感器变量
let isGyroActive = false;

// 物理参数
let posA = new THREE.Vector3(1, 0, 0), velA = new THREE.Vector3(0, 1.85, 0.35);
let posB = new THREE.Vector3(1.001, 0, 0), velB = new THREE.Vector3(0, 1.85, 0.35);
let effectiveT = 0;
let gravityConst = -4.2;
let cyStrength = 1.35;
let memoryStrength = 0.08;
let microPerturb = 0.0;

let currentR = 1.6;
const r0 = 1.6;
const breathAmp = 0.08;
const breathOmega = 0.5;

const pathA = [], pathB = [];

// 3D场景
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
camera.position.set(0, 0, 10);
camera.lookAt(0, 0, 0);
const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('canvas-3d'), antialias: true });

const lineMatA = new THREE.LineBasicMaterial({ color: 0x00ffff });
const lineMatB = new THREE.LineBasicMaterial({ color: 0xff00ff });
const geoA = new THREE.BufferGeometry(), geoB = new THREE.BufferGeometry();
const lineA = new THREE.Line(geoA, lineMatA), lineB = new THREE.Line(geoB, lineMatB);
scene.add(lineA); scene.add(lineB);

let manifoldMesh = null;
let baseGeo = null;
let originalPositions = null;
let positionAttribute = null;
let colorAttribute = null;
let vertexCount = 0;
let currentManifoldType = "Calabi-Yau (Initial)";

const cloudCanvasOrig = document.getElementById('canvas-cloud');
const entropyCanvasOrig = document.getElementById('canvas-entropy');
const cloudCanvasMobile = document.getElementById('canvas-cloud-mobile');
const entropyCanvasMobile = document.getElementById('canvas-entropy-mobile');
let cloudCtx, entropyCtx;

function updateActiveCanvases() {
    const isPortraitMobile = window.innerWidth <= 768 && window.innerHeight > window.innerWidth;
    if (isPortraitMobile && cloudCanvasMobile && entropyCanvasMobile) {
        cloudCtx = cloudCanvasMobile.getContext('2d');
        entropyCtx = entropyCanvasMobile.getContext('2d');
        if (cloudCanvasMobile.width !== cloudCanvasMobile.clientWidth || cloudCanvasMobile.height !== cloudCanvasMobile.clientHeight) {
            cloudCanvasMobile.width = cloudCanvasMobile.clientWidth;
            cloudCanvasMobile.height = cloudCanvasMobile.clientHeight;
        }
        if (entropyCanvasMobile.width !== entropyCanvasMobile.clientWidth || entropyCanvasMobile.height !== entropyCanvasMobile.clientHeight) {
            entropyCanvasMobile.width = entropyCanvasMobile.clientWidth;
            entropyCanvasMobile.height = entropyCanvasMobile.clientHeight;
        }
    } else {
        cloudCtx = cloudCanvasOrig.getContext('2d');
        entropyCtx = entropyCanvasOrig.getContext('2d');
        if (cloudCanvasOrig.width !== 160) cloudCanvasOrig.width = 160;
        if (cloudCanvasOrig.height !== 100) cloudCanvasOrig.height = 100;
        if (entropyCanvasOrig.width !== 160) entropyCanvasOrig.width = 160;
        if (entropyCanvasOrig.height !== 100) entropyCanvasOrig.height = 100;
    }
}

// ========== 随机流形工厂 ==========
function normalizeGeometryToRadius(geometry, targetRadius = 1.6) {
    const positions = geometry.attributes.position.array;
    let sumLen = 0;
    const cnt = positions.length / 3;
    for (let i = 0; i < cnt; i++) {
        const x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
        sumLen += Math.hypot(x, y, z);
    }
    const avgLen = sumLen / cnt;
    if (avgLen === 0) return;
    const scale = targetRadius / avgLen;
    for (let i = 0; i < positions.length; i++) {
        positions[i] *= scale;
    }
    geometry.computeVertexNormals();
    return geometry;
}

function createTorusKnotVariant(p, q) {
    return new THREE.TorusKnotGeometry(1.6, 0.4, 80, 16, p, q);
}

function createFermatCubicLike() {
    const geo = new THREE.SphereGeometry(1.6, 64, 32);
    const positions = geo.attributes.position.array;
    for (let i = 0; i < positions.length / 3; i++) {
        let x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
        const r0 = Math.hypot(x, y, z);
        if (r0 < 0.01) continue;
        const theta = Math.acos(z / r0);
        const phi = Math.atan2(y, x);
        const deform = 0.18 * Math.cos(3 * phi) * Math.sin(2 * theta) 
                     + 0.12 * Math.sin(5 * theta) * Math.cos(2 * phi)
                     + 0.07 * Math.sin(3 * phi) * Math.cos(3 * theta);
        const newR = r0 * (1 + deform);
        const scale = newR / r0;
        positions[i*3] *= scale;
        positions[i*3+1] *= scale;
        positions[i*3+2] *= scale;
    }
    return geo;
}

function createTwistedTorus() {
    const geo = new THREE.TorusKnotGeometry(1.6, 0.45, 100, 20, 3, 4);
    const positions = geo.attributes.position.array;
    for (let i = 0; i < positions.length / 3; i++) {
        let x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
        const r = Math.hypot(x, y, z);
        if (r < 0.01) continue;
        const theta = Math.atan2(y, x);
        const phi = Math.acos(z / r);
        const twist = 0.22 * Math.sin(5 * theta) * Math.cos(3 * phi);
        const radFactor = 1 + twist;
        positions[i*3] *= radFactor;
        positions[i*3+1] *= radFactor;
        positions[i*3+2] *= radFactor;
    }
    return geo;
}

function createComplexKnot() {
    return new THREE.TorusKnotGeometry(1.6, 0.38, 100, 20, 5, 6);
}

function createHarmonicManifold() {
    const geo = new THREE.IcosahedronGeometry(1.6, 2);
    const positions = geo.attributes.position.array;
    for (let i = 0; i < positions.length / 3; i++) {
        let x = positions[i*3], y = positions[i*3+1], z = positions[i*3+2];
        const r0 = Math.hypot(x, y, z);
        if (r0 === 0) continue;
        const theta = Math.acos(z / r0);
        const phi = Math.atan2(y, x);
        const harmonic = 0.14 * Math.sin(4 * theta) * Math.cos(3 * phi)
                       + 0.09 * Math.sin(6 * phi) * Math.cos(2 * theta);
        const newR = r0 * (1 + harmonic);
        const scale = newR / r0;
        positions[i*3] *= scale;
        positions[i*3+1] *= scale;
        positions[i*3+2] *= scale;
    }
    return geo;
}

function selectRandomManifold() {
    const manifolds = [
        { name: "Torus Knot (2,3) · 经典卡拉比-丘", generator: () => createTorusKnotVariant(2, 3) },
        { name: "Torus Knot (3,7) · 弦景观结", generator: () => createTorusKnotVariant(3, 7) },
        { name: "Torus Knot (5,4) · 五次扭结", generator: () => createTorusKnotVariant(5, 4) },
        { name: "费马三次曲面近似 · Fermat Cubic", generator: createFermatCubicLike },
        { name: "扭曲卡拉比-丘流形 · Twisted Torus", generator: createTwistedTorus },
        { name: "高亏格环形结 (5,6) · 紧致化", generator: createComplexKnot },
        { name: "球面调和流形 · Harmonic CY", generator: createHarmonicManifold },
        { name: "Torus Knot (8,3) · 混沌共振", generator: () => createTorusKnotVariant(8, 3) }
    ];
    const idx = Math.floor(Math.random() * manifolds.length);
    const selected = manifolds[idx];
    currentManifoldType = selected.name;
    const geometry = selected.generator();
    normalizeGeometryToRadius(geometry, 1.6);
    return geometry;
}

function initManifoldWithRandomGeometry() {
    if (manifoldMesh) scene.remove(manifoldMesh);
    baseGeo = selectRandomManifold();
    const colorArray = new Float32Array(baseGeo.attributes.position.count * 3);
    baseGeo.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));
    for (let i = 0; i < baseGeo.attributes.position.count; i++) {
        colorArray[i*3] = 1.0;
        colorArray[i*3+1] = 1.0;
        colorArray[i*3+2] = 0.0;
    }
    const meshMat = new THREE.MeshBasicMaterial({ vertexColors: true, wireframe: true });
    manifoldMesh = new THREE.Mesh(baseGeo, meshMat);
    scene.add(manifoldMesh);
    positionAttribute = baseGeo.attributes.position;
    vertexCount = positionAttribute.count;
    colorAttribute = baseGeo.attributes.color;
    originalPositions = positionAttribute.array.slice();
    currentR = r0;
    manifoldMesh.scale.setScalar(1.0);
}

// ========== 空间体感逻辑 ==========
function handleOrientation(event) {
    if (!isGyroActive || !manifoldMesh) return;
    // 转换为弧度
    const alpha = event.alpha ? THREE.MathUtils.degToRad(event.alpha) : 0;
    const beta = event.beta ? THREE.MathUtils.degToRad(event.beta) : 0;
    const gamma = event.gamma ? THREE.MathUtils.degToRad(event.gamma) : 0;
    // 逆向旋转补偿，使流形相对现实空间静止
    manifoldMesh.rotation.set(-beta, -alpha, -gamma, 'ZXY');
}

// ========== 相机控制 ==========
const canvas3d = document.getElementById('canvas-3d');
let isDragging = false;
let lastTouchDist = 0;
let lastMousePos = { x: 0, y: 0 };
let cameraRotation = { theta: 0, phi: 0 };
let targetZoom = 10;
let currentZoom = 10;

function updateCameraPosition() {
    const x = currentZoom * Math.sin(cameraRotation.theta) * Math.cos(cameraRotation.phi);
    const y = currentZoom * Math.sin(cameraRotation.phi);
    const z = currentZoom * Math.cos(cameraRotation.theta) * Math.cos(cameraRotation.phi);
    camera.position.set(x, y, z);
    camera.lookAt(0, 0, 0);
}

function onPointerStart(e) {
    if(e.target.closest('.gyro-control')) return; 
    e.preventDefault();
    isDragging = true;
    if (e.touches && e.touches.length === 1) {
        lastMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else {
        lastMousePos = { x: e.clientX, y: e.clientY };
    }
    window._dragStartTime = Date.now();
    window._dragStartPos = { x: lastMousePos.x, y: lastMousePos.y };
}

function onPointerMove(e) {
    if (!isDragging) return;
    e.preventDefault();
    let dx = 0, dy = 0;
    if (e.touches && e.touches.length === 1) {
        dx = e.touches[0].clientX - lastMousePos.x;
        dy = e.touches[0].clientY - lastMousePos.y;
        lastMousePos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    } else {
        dx = e.clientX - lastMousePos.x;
        dy = e.clientY - lastMousePos.y;
        lastMousePos = { x: e.clientX, y: e.clientY };
    }
    cameraRotation.theta += dx * 0.005;
    cameraRotation.phi += dy * 0.005;
    cameraRotation.phi = Math.min(Math.max(cameraRotation.phi, -Math.PI/2 + 0.1), Math.PI/2 - 0.1);
    updateCameraPosition();
}

function onPointerEnd(e) {
    if (!isDragging) return;
    isDragging = false;
    const duration = Date.now() - (window._dragStartTime || 0);
    const startPos = window._dragStartPos || { x: 0, y: 0 };
    let endX = 0, endY = 0;
    if (e.changedTouches && e.changedTouches.length === 1) {
        endX = e.changedTouches[0].clientX;
        endY = e.changedTouches[0].clientY;
    } else {
        endX = e.clientX;
        endY = e.clientY;
    }
    const distance = Math.hypot(endX - startPos.x, endY - startPos.y);
    if (duration < 200 && distance < 5 && started) {
        paused = !paused;
    }
}

function onTouchStart(e) {
    if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        lastTouchDist = Math.hypot(dx, dy);
        e.preventDefault();
    }
}

function onTouchMove(e) {
    if (e.touches.length === 2) {
        const dx = e.touches[0].clientX - e.touches[1].clientX;
        const dy = e.touches[0].clientY - e.touches[1].clientY;
        const dist = Math.hypot(dx, dy);
        if (lastTouchDist > 0) {
            const delta = dist - lastTouchDist;
            targetZoom = Math.min(Math.max(targetZoom - delta * 0.01, 3), 20);
            currentZoom += (targetZoom - currentZoom) * 0.2;
            updateCameraPosition();
        }
        lastTouchDist = dist;
        e.preventDefault();
    }
}

function onWheel(e) {
    e.preventDefault();
    targetZoom += e.deltaY * 0.01;
    targetZoom = Math.min(Math.max(targetZoom, 3), 20);
    currentZoom += (targetZoom - currentZoom) * 0.2;
    updateCameraPosition();
}

canvas3d.addEventListener('mousedown', onPointerStart);
window.addEventListener('mousemove', onPointerMove);
window.addEventListener('mouseup', onPointerEnd);
canvas3d.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) onPointerStart(e);
    else if (e.touches.length === 2) onTouchStart(e);
});
canvas3d.addEventListener('touchmove', (e) => {
    if (e.touches.length === 1) onPointerMove(e);
    else if (e.touches.length === 2) onTouchMove(e);
});
canvas3d.addEventListener('touchend', onPointerEnd);
canvas3d.addEventListener('wheel', onWheel, { passive: false });

// ========== 音频初始化 ==========
function initAudio() {
    if (audioCtx) return;
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    oscillatorA = audioCtx.createOscillator();
    oscillatorB = audioCtx.createOscillator();
    gainNode = audioCtx.createGain();
    analyser = audioCtx.createAnalyser();
    oscillatorA.type = 'sine';
    oscillatorB.type = 'sine';
    gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime);
    oscillatorA.connect(gainNode);
    oscillatorB.connect(gainNode);
    gainNode.connect(analyser);
    analyser.connect(audioCtx.destination);
    oscillatorA.start();
    oscillatorB.start();
}

async function startAudio() {
    if (audioCtx && audioCtx.state === 'suspended') {
        await audioCtx.resume();
    }
}

// ========== 流形扰动与顶点颜色 ==========
function updateManifoldWithRipple() {
    if (!positionAttribute || !originalPositions) return;
    const p1 = posA;
    const p2 = posB;
    const positions = positionAttribute.array;
    for (let i = 0; i < vertexCount * 3; i++) {
        positions[i] = originalPositions[i];
    }
    const rippleStrength = 0.25;
    const soften = 0.5;
    for (let i = 0; i < vertexCount; i++) {
        const ix = i * 3, iy = i*3+1, iz = i*3+2;
        let x = positions[ix], y = positions[iy], z = positions[iz];
        let totalRipple = 0;
        const dx1 = x - p1.x, dy1 = y - p1.y, dz1 = z - p1.z;
        const distSq1 = dx1*dx1 + dy1*dy1 + dz1*dz1 + 1e-6;
        totalRipple += rippleStrength / (distSq1 + soften);
        const dx2 = x - p2.x, dy2 = y - p2.y, dz2 = z - p2.z;
        const distSq2 = dx2*dx2 + dy2*dy2 + dz2*dz2 + 1e-6;
        totalRipple += rippleStrength / (distSq2 + soften);
        const len = Math.hypot(x, y, z);
        if (len > 0.01) {
            const nx = x / len, ny = y / len, nz = z / len;
            const shift = totalRipple * 0.4;
            positions[ix] += nx * shift;
            positions[iy] += ny * shift;
            positions[iz] += nz * shift;
        }
    }
    positionAttribute.needsUpdate = true;
}

function updateVertexColors() {
    if (!positionAttribute || !colorAttribute) return;
    const positions = positionAttribute.array;
    const colorArray = colorAttribute.array;
    const radius = 0.45;
    for (let i = 0; i < vertexCount; i++) {
        const ix = i * 3, iy = i*3+1, iz = i*3+2;
        const x = positions[ix], y = positions[iy], z = positions[iz];
        const dxA = x - posA.x, dyA = y - posA.y, dzA = z - posA.z;
        const distA = Math.hypot(dxA, dyA, dzA);
        const dxB = x - posB.x, dyB = y - posB.y, dzB = z - posB.z;
        const distB = Math.hypot(dxB, dyB, dzB);
        const minDist = Math.min(distA, distB);
        let t = Math.min(1, (minDist / radius) ** 4);
        colorArray[ix] = 1.0;
        colorArray[iy] = t;
        colorArray[iz] = 0.0;
    }
    colorAttribute.needsUpdate = true;
}

// ========== 熵计算与绘图 ==========
function computeEntropy() {
    if (entropyPoints.length < 10) return 0;
    const bins = 10;
    const hist = Array(bins).fill().map(() => Array(bins).fill(0));
    for (let p of entropyPoints) {
        const ix = Math.min(bins-1, Math.floor(p.x * bins));
        const iy = Math.min(bins-1, Math.floor(p.y * bins));
        hist[ix][iy] += 1;
    }
    const total = entropyPoints.length;
    let entropy = 0;
    for (let i=0; i<bins; i++) {
        for (let j=0; j<bins; j++) {
            if (hist[i][j] > 0) {
                const p = hist[i][j] / total;
                entropy -= p * Math.log2(p);
            }
        }
    }
    return entropy;
}

function drawAxes(ctx, width, height, xMax, yMax, xTickValues, yTickValues, xLabelFormatter, yLabelFormatter) {
    ctx.save();
    ctx.strokeStyle = '#333';
    ctx.fillStyle = '#888';
    ctx.font = '8px monospace';
    ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(0, height); ctx.lineTo(width, height); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(0, height); ctx.stroke();
    for (let v of xTickValues) {
        const x = (v / xMax) * width;
        ctx.beginPath(); ctx.moveTo(x, height-3); ctx.lineTo(x, height+3); ctx.stroke();
        ctx.fillText(xLabelFormatter(v), x-6, height+12);
    }
    for (let v of yTickValues) {
        const y = height - (v / yMax) * height;
        ctx.beginPath(); ctx.moveTo(-3, y); ctx.lineTo(3, y); ctx.stroke();
        ctx.fillText(yLabelFormatter(v), 8, y+3);
    }
    ctx.restore();
}

function updateWaveform() {
    if (!analyser || !audioCtx || audioCtx.state !== 'running') return;
    const dataArray = new Uint8Array(analyser.frequencyBinCount);
    analyser.getByteTimeDomainData(dataArray);
    for (let i = 0; i < dataArray.length; i += 16) {
        const v = (dataArray[i] - 128) / 128;
        waveBuffer.push(v);
    }
    while (waveBuffer.length > 700) waveBuffer.shift();
}

function resizeWaveCanvas() {
    const waveCanvas = document.getElementById('canvas-wave');
    const container = document.getElementById('waveform-container');
    if (!waveCanvas || !container) return;
    const w = container.clientWidth;
    const h = container.clientHeight;
    if (w > 0 && h > 0 && (waveCanvas.width !== w || waveCanvas.height !== h)) {
        waveCanvas.width = w;
        waveCanvas.height = h;
        waveCanvas.getContext('2d').fillStyle = '#050505';
        waveCanvas.getContext('2d').fillRect(0, 0, w, h);
    }
}

const waveCanvas = document.getElementById('canvas-wave');
const waveCtx = waveCanvas.getContext('2d');

function drawAnalytics() {
    updateActiveCanvases();
    resizeWaveCanvas();
    if (!cloudCtx || !entropyCtx) return;
    const cloudW = cloudCtx.canvas.width, cloudH = cloudCtx.canvas.height;
    const entropyW = entropyCtx.canvas.width, entropyH = entropyCtx.canvas.height;
    cloudCtx.fillStyle = '#080808';
    cloudCtx.fillRect(0, 0, cloudW, cloudH);
    cloudCtx.fillStyle = '#0ff';
    for (let p of entropyPoints) {
        cloudCtx.fillRect(p.x * cloudW, p.y * cloudH, 1, 1);
    }
    drawAxes(cloudCtx, cloudW, cloudH, 1, 1, [0,0.5,1], [0,0.5,1], v=>v.toFixed(1), v=>v.toFixed(1));
    const currentEntropy = computeEntropy();
    entropyHistory.push(currentEntropy);
    if (entropyHistory.length > 200) entropyHistory.shift();
    const yMax = 7.0;
    entropyCtx.fillStyle = '#080808';
    entropyCtx.fillRect(0, 0, entropyW, entropyH);
    entropyCtx.strokeStyle = '#ff0';
    entropyCtx.lineWidth = 1.2;
    entropyCtx.beginPath();
    const step = entropyW / Math.max(1, entropyHistory.length-1);
    for (let i=0; i<entropyHistory.length; i++) {
        const x = i * step;
        const y = entropyH - (Math.min(entropyHistory[i], yMax)/yMax)*entropyH;
        if(i===0) entropyCtx.moveTo(x,y); else entropyCtx.lineTo(x,y);
    }
    entropyCtx.stroke();
    drawAxes(entropyCtx, entropyW, entropyH, entropyHistory.length-1, yMax, [0, Math.floor(entropyHistory.length/2), entropyHistory.length-1], [0,2,4,6,7], v=>v, v=>v.toFixed(1));
    updateWaveform();
    if (waveBuffer.length > 1 && waveCanvas.width>0 && waveCanvas.height>0) {
        waveCtx.fillStyle = '#050505';
        waveCtx.fillRect(0, 0, waveCanvas.width, waveCanvas.height);
        waveCtx.strokeStyle = '#ff0';
        waveCtx.lineWidth = 1.5;
        waveCtx.beginPath();
        const stepX = waveCanvas.width / (waveBuffer.length-1);
        for(let i=0;i<waveBuffer.length;i++) {
            const x = i*stepX;
            const y = waveCanvas.height/2 * (1 - waveBuffer[i]);
            if(i===0) waveCtx.moveTo(x,y); else waveCtx.lineTo(x,y);
        }
        waveCtx.stroke();
    }
    const status = started ? (paused ? "PAUSED" : "RUNNING") : "INIT";
    const freqDisplay = Math.round(180 + Math.abs(velA.length() * 70));
    const azimuth = (manifoldMesh ? (manifoldMesh.rotation.y * 180 / Math.PI).toFixed(1) : "0.0");
    document.getElementById('info').innerHTML = `
[ 11D MANIFOLD OBSERVATORY ]<br>
-----------------------------<br>
SYS STATUS     : ${status}<br>
MANIFOLD TYPE  : ${currentManifoldType}<br>
TIME STEP      : ${effectiveT}<br>
GEOMETRY R     : ${currentR.toFixed(4)}<br>
G-CONSTANT     : ${gravityConst.toFixed(5)}<br>
AUDIO FREQ     : ${freqDisplay} Hz<br>
RANDOM ENTROPY : ${microPerturb.toFixed(6)}<br>
SENSOR INTERACT: ${isGyroActive ? "ACTIVE" : "OFF"}<br>
VIEWPORT :<br>
  DISTANCE : ${currentZoom.toFixed(1)}<br>
  AZIMUTH  : ${azimuth}°<br>
    `;
    document.getElementById('hex-stream').innerHTML = `>>> ALETHEIA_ECHO: ${lastHash.substring(0,32)}... | μ: ${microPerturb.toFixed(5)} | H: ${currentEntropy.toFixed(4)} bits | 流形: ${currentManifoldType}`;
}

// ========== 混沌物理引擎 ==========
async function aletheiaEngine() {
    const raw = posA.x.toString() + posA.y.toString() + velB.z.toString();
    const msgUint8 = new TextEncoder().encode(raw);
    const hashBuffer = await crypto.subtle.digest('SHA-256', msgUint8);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    lastHash = hashArray.map(b => b.toString(16).padStart(2,'0')).join('');
    const ux = hashArray[0]/255, uy = hashArray[1]/255;
    entropyPoints.push({x:ux, y:uy});
    if(entropyPoints.length>500) entropyPoints.shift();
    const entropyVal = parseInt(lastHash.slice(-8),16)/0xFFFFFFFF;
    microPerturb = (entropyVal-0.5)*0.05;
    gravityConst = -4.2 + microPerturb*2.0;
    cyStrength = 1.35 + microPerturb*1.2;
    memoryStrength = 0.08 + Math.abs(microPerturb)*0.1;
    const chaosModA = Math.sin(posA.x*6)*Math.cos(posA.y*6)*Math.sin(posA.z*6);
    const chaosModB = Math.sin(posB.x*6)*Math.cos(posB.y*6)*Math.sin(posB.z*6);
    let freqA = 180 + Math.abs(velA.length()*70)*(1+0.6*chaosModA);
    let freqB = 180 + Math.abs(velB.length()*70)*(1+0.6*chaosModB);
    freqA = Math.min(1300, Math.max(70, freqA));
    freqB = Math.min(1300, Math.max(70, freqB));
    const jitter = (hashArray[31]/255-0.5)*30;
    if(oscillatorA) {
        oscillatorA.frequency.setTargetAtTime(freqA + jitter, audioCtx.currentTime, 0.05);
        oscillatorB.frequency.setTargetAtTime(freqB - jitter, audioCtx.currentTime, 0.05);
    }
}

function physicalStep() {
    effectiveT++;
    currentR = r0 + breathAmp * Math.sin(breathOmega * effectiveT * 0.1);
    if(manifoldMesh) manifoldMesh.scale.setScalar(currentR / 1.6);
    const particles = [{p: posA, v: velA, path: pathA}, {p: posB, v: velB, path: pathB}];
    particles.forEach(obj => {
        const r = obj.p.length() + 1e-9;
        const f_macro = obj.p.clone().multiplyScalar(gravityConst / Math.pow(r, 2.9));
        const cy_x = Math.sin(7*obj.p.x)+0.3*Math.sin(13*obj.p.y);
        const cy_y = Math.cos(7*obj.p.y)+0.3*Math.cos(13*obj.p.z);
        const cy_z = Math.sin(7*obj.p.z+Math.cos(obj.p.x))+0.3*Math.sin(11*obj.p.x);
        let f_cy = new THREE.Vector3(cy_x, cy_y, cy_z);
        f_cy.multiplyScalar(cyStrength * (1+0.6*Math.sin(effectiveT * 0.008)));
        let memoryForce = new THREE.Vector3(0,0,0);
        if(obj.path.length > 15) {
            let avgPos = new THREE.Vector3(0,0,0);
            const start = Math.max(0, obj.path.length-25);
            for(let i=start;i<obj.path.length;i++) avgPos.add(obj.path[i]);
            avgPos.divideScalar(obj.path.length-start);
            memoryForce = avgPos.clone().sub(obj.p).multiplyScalar(memoryStrength);
        }
        obj.v.add(f_macro.add(f_cy).add(memoryForce).multiplyScalar(0.0075));
        obj.p.add(obj.v.clone().multiplyScalar(0.0075));
        obj.path.push(obj.p.clone());
        if(obj.path.length>200) obj.path.shift();
    });
    [velA, velB].forEach(v => { if(v.length()>14) v.multiplyScalar(14/v.length()); });
    geoA.setFromPoints(pathA);
    geoB.setFromPoints(pathB);
    
    // 只有当感应模式未激活时才自转
    if(manifoldMesh && !isGyroActive) manifoldMesh.rotation.y += 0.008;
    
    if(effectiveT % 3 === 0) updateManifoldWithRipple();
    updateVertexColors();
}

let animationFrameId = null, backgroundIntervalId = null, isPageVisible = true;
function runForeground() {
    if (!started) return;
    if (!paused) { physicalStep(); aletheiaEngine(); } else { updateVertexColors(); updateWaveform(); }
    drawAnalytics();
    renderer.render(scene, camera);
    animationFrameId = requestAnimationFrame(runForeground);
}
function runBackground() {
    if (!started) return;
    if (!paused) { physicalStep(); aletheiaEngine(); drawAnalytics(); } else { updateVertexColors(); updateWaveform(); drawAnalytics(); }
}
function onVisibilityChange() {
    isPageVisible = !document.hidden;
    if (!started) return;
    if (isPageVisible) {
        if(backgroundIntervalId) clearInterval(backgroundIntervalId);
        if(animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(runForeground);
    } else {
        if(animationFrameId) cancelAnimationFrame(animationFrameId);
        if(backgroundIntervalId) clearInterval(backgroundIntervalId);
        backgroundIntervalId = setInterval(runBackground, 33);
    }
}
function startBackgroundSupport() {
    if(started) { onVisibilityChange(); document.addEventListener('visibilitychange', onVisibilityChange); }
}

function resize3D() {
    const container = canvas3d.parentElement;
    if (container.clientWidth > 0 && container.clientHeight > 0) {
        renderer.setSize(container.clientWidth, container.clientHeight);
        camera.aspect = container.clientWidth / container.clientHeight;
        camera.updateProjectionMatrix();
    }
}

function handleResize() {
    resize3D(); resizeWaveCanvas(); updateActiveCanvases(); drawAnalytics();
}

// ========== 启动入口 ==========
initManifoldWithRandomGeometry();
resize3D();
updateActiveCanvases();

document.getElementById('overlay').addEventListener('click', async (e) => {
    // 防止点击复选框触发启动
    if(e.target.closest('.gyro-control')) return; 

    if(!started){
        initAudio();
        await startAudio();
        
        // 陀螺仪初始化
        const gyroToggle = document.getElementById('gyro-toggle');
        if (gyroToggle && gyroToggle.checked) {
            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                try {
                    const permission = await DeviceOrientationEvent.requestPermission();
                    if (permission === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                        isGyroActive = true;
                    }
                } catch (err) { console.error("Gyro permission denied"); }
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
                isGyroActive = true;
            }
        }

        started = true;
        paused = false;
        document.getElementById('overlay').classList.add('hidden');
        updateActiveCanvases();
        resizeWaveCanvas();
        const seed = (Math.random()-0.5)*0.03;
        gravityConst += seed;
        cyStrength += seed*0.8;
        memoryStrength += Math.abs(seed)*0.05;
        startBackgroundSupport();
        if (animationFrameId) cancelAnimationFrame(animationFrameId);
        animationFrameId = requestAnimationFrame(runForeground);
    }
});

window.addEventListener('resize', handleResize);
window.addEventListener('orientationchange', () => setTimeout(handleResize, 50));
</script>
